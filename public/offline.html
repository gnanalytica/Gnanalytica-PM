<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="You're currently offline. Some features may be limited." />
  <meta name="theme-color" content="#FF6B35" />
  <title>You're Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* Light mode colors */
      --bg-background: #FAFBFC;
      --bg-primary: #FFFFFF;
      --bg-secondary: #F5F3F0;
      --border-subtle: #E8DED7;
      --text-primary: #1A1A1A;
      --text-secondary: #6B5B52;
      --text-muted: #7A6B60;
      --accent-coral: #FF6B35;
      --accent-coral-soft: rgba(255, 107, 53, 0.08);
      --shadow-md-val: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-background: #0F1419;
        --bg-primary: #1A1F2E;
        --bg-secondary: #2A2520;
        --border-subtle: #4A413A;
        --text-primary: #F5F3F0;
        --text-secondary: #B8AFA6;
        --text-muted: #8B7E77;
        --accent-coral: #FF8557;
        --accent-coral-soft: rgba(255, 133, 87, 0.12);
        --shadow-md-val: 0 4px 6px rgba(0, 0, 0, 0.3);
      }
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-background);
      color: var(--text-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      padding: 16px;
    }

    .offline-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      max-width: 500px;
      text-align: center;
      animation: slideUp 300ms cubic-bezier(0.32, 0.72, 0, 1);
    }

    .offline-icon {
      font-size: 64px;
      margin-bottom: 24px;
      animation: bounce 2s infinite;
    }

    .offline-heading {
      font-size: 32px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .offline-description {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .offline-button {
      display: inline-block;
      padding: 12px 24px;
      background-color: var(--accent-coral);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 150ms cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      margin-bottom: 32px;
    }

    .offline-button:hover {
      filter: brightness(1.05);
      box-shadow: var(--shadow-md-val);
    }

    .offline-button:active {
      transform: scale(0.96);
    }

    .cached-section {
      width: 100%;
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 20px;
      text-align: left;
      margin-top: 16px;
    }

    .cached-heading {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .cached-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .cached-list-item {
      display: flex;
      align-items: center;
      padding: 12px;
      background-color: var(--bg-primary);
      border-radius: 8px;
      border: 1px solid var(--border-subtle);
      text-decoration: none;
      color: var(--text-primary);
      transition: all 150ms ease;
    }

    .cached-list-item:hover {
      background-color: var(--accent-coral-soft);
      border-color: var(--accent-coral);
    }

    .cached-list-item-icon {
      margin-right: 12px;
      font-size: 18px;
    }

    .cached-list-item-text {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
    }

    .cached-list-item-badge {
      display: inline-block;
      padding: 4px 8px;
      background-color: var(--accent-coral-soft);
      color: var(--accent-coral);
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
      }
    }

    @media (max-width: 600px) {
      .offline-heading {
        font-size: 28px;
      }

      .offline-icon {
        font-size: 48px;
        margin-bottom: 20px;
      }

      .offline-container {
        max-width: 100%;
      }

      .cached-section {
        padding: 16px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .offline-container,
      .offline-icon {
        animation: none;
      }

      .offline-button,
      .cached-list-item {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1 class="offline-heading">You're Offline</h1>
    <p class="offline-description">
      It looks like you've lost your internet connection. Don't worry—you can still access your cached data and continue working when you're back online.
    </p>

    <button class="offline-button" onclick="goHome()">Go Back Home</button>

    <div class="cached-section">
      <div class="cached-heading">Cached Pages Available</div>
      <ul class="cached-list">
        <li class="cached-list-item" onclick="navigateTo('/')">
          <span class="cached-list-item-icon">📊</span>
          <span class="cached-list-item-text">Dashboard</span>
          <span class="cached-list-item-badge">Cached</span>
        </li>
        <li class="cached-list-item" onclick="navigateTo('/my-issues')">
          <span class="cached-list-item-icon">✓</span>
          <span class="cached-list-item-text">My Issues</span>
          <span class="cached-list-item-badge">Cached</span>
        </li>
      </ul>
    </div>
  </div>

  <script>
    function goHome() {
      navigateTo('/');
    }

    function navigateTo(path) {
      window.location.href = path;
    }

    // Detect when connection is restored
    window.addEventListener('online', () => {
      // Optionally notify user and reload
      const notification = document.createElement('div');
      notification.textContent = 'You are back online!';
      notification.style.cssText = `
        position: fixed;
        bottom: 20px;
        left: 20px;
        right: 20px;
        padding: 16px;
        background-color: var(--accent-coral);
        color: white;
        border-radius: 8px;
        box-shadow: var(--shadow-md-val);
        animation: slideUp 300ms cubic-bezier(0.32, 0.72, 0, 1);
        z-index: 9999;
      `;
      document.body.appendChild(notification);

      // Auto-reload after 2 seconds
      setTimeout(() => {
        window.location.reload();
      }, 2000);
    });
  </script>
</body>
</html>
