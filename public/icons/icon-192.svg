<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with subtle shadow -->
  <defs>
    <filter id="shadow192">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="grad192" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5F5F5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main background circle -->
  <circle cx="96" cy="96" r="96" fill="url(#grad192)" filter="url(#shadow192)"/>

  <!-- Accent ring -->
  <circle cx="96" cy="96" r="96" fill="none" stroke="#FF6B35" stroke-width="2" opacity="0.3"/>

  <!-- Letter G design - bold and recognizable -->
  <g transform="translate(96, 96)">
    <!-- Outer arc of G -->
    <path d="M -28 -8 A 36 36 0 0 0 -36 0 A 36 36 0 0 0 0 36 A 36 36 0 0 0 36 0"
          fill="none" stroke="#FF6B35" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Horizontal bar of G -->
    <rect x="-4" y="8" width="32" height="8" fill="#FF6B35" rx="2"/>
  </g>

  <!-- Safe zone indicator (80% center circle - for maskable icons) -->
  <circle cx="96" cy="96" r="77" fill="none" stroke="#FF6B35" stroke-width="0.5" opacity="0.2" stroke-dasharray="2,2"/>
</svg>
